<form [formGroup]="purchaseForm" (ngSubmit)="onSubmit()">

  <h2>Customer Details</h2>

  <input type="text" placeholder="Name" formControlName="name" />
  <div *ngIf="purchaseForm.get('name')?.touched && purchaseForm.get('name')?.invalid">
    Name is required
  </div>

  <input type="email" placeholder="Email" formControlName="email" />
  <div *ngIf="purchaseForm.get('email')?.touched && purchaseForm.get('email')?.invalid">
    Enter valid email
  </div>

  <input type="text" placeholder="Address" formControlName="address" />
  <input type="text" placeholder="City" formControlName="city" />
  <input type="text" placeholder="Country" formControlName="country" />
  <input type="text" placeholder="Phone" formControlName="phone" />

  <h2>Product Details</h2>

  <input type="text" placeholder="Product Name" formControlName="productName" />
  <input type="number" placeholder="Price" formControlName="price" />
  <input type="text" placeholder="Brand" formControlName="brand" />
  <input type="text" placeholder="Category" formControlName="category" />
  <input type="date" formControlName="purchasedDate" />

  <button type="submit">Submit</button>

</form>
